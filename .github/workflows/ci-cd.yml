name: CI/CD — API Gateway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  ci:
    name: 🧪 CI — Install & Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: ✅ Validación
        run: echo "Dependencias instaladas correctamente. Listo para deploy."

  deploy:
    name: 🚀 Verify Deploy → Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⏳ Esperar que Railway procese el despliegue
        run: sleep 30

      - name: 🔍 Verificar que el servicio responde en producción
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://web-production-1f202.up.railway.app/health)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ API Gateway está funcionando correctamente en producción"
          else
            echo "⚠️ El servicio respondió con HTTP $STATUS (Railway puede estar aún desplegando)"
          fi

      - name: ✅ Pipeline completado
        run: echo "🎉 CI/CD del API Gateway completado. Railway maneja el deploy automáticamente via integración con GitHub."
