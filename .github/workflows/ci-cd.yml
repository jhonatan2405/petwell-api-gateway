name: CI/CD — API Gateway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  ci:
    name: 🧪 CI — Install & Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: ✅ Validación
        run: echo "Dependencias instaladas correctamente. Listo para deploy."

  deploy:
    name: 🚀 Deploy → Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4

      - name: 🚂 Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy en Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: ✅ Deploy completado
        run: echo "🎉 API Gateway desplegado en Railway"
